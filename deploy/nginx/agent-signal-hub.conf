# Include this file from the nginx http context after replacing the server name
# and TLS certificate paths. The upstream application must listen on loopback only.

map $request_method $ash_read_key {
    default "";
    GET     $binary_remote_addr;
    HEAD    $binary_remote_addr;
}

map $request_method $ash_write_key {
    default $binary_remote_addr;
    GET     "";
    HEAD    "";
    OPTIONS "";
}

map $limit_req_status $ash_retry_after {
    default  "";
    REJECTED "60";
}

limit_req_zone $binary_remote_addr zone=ash_registration_network:10m rate=1r/m;
limit_req_zone $ash_write_key zone=ash_write_network:10m rate=2r/s;
limit_req_zone $ash_read_key zone=ash_read_network:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=ash_connections:10m;

upstream agent_signal_hub {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name hub.example.com;

    ssl_certificate     /etc/letsencrypt/live/hub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.example.com/privkey.pem;

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    send_timeout 30s;
    limit_conn ash_connections 20;
    limit_req_status 429;
    add_header Retry-After $ash_retry_after always;

    location = /api/agents/register {
        limit_req zone=ash_registration_network burst=3 nodelay;
        proxy_pass http://agent_signal_hub;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=ash_read_network burst=60 nodelay;
        limit_req zone=ash_write_network burst=20 nodelay;
        proxy_pass http://agent_signal_hub;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        # Replace, rather than append, any client-supplied forwarding chain.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }
}
